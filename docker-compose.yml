services:
  postgres:
    image: postgres:16
    container_name: ai-analyst-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  mcp:
    build:
      context: ./backend/mcp
      dockerfile: Dockerfile
    container_name: ai-analyst-mcp
    restart: unless-stopped
    environment:
      PGHOST: postgres
      PGPORT: 5432
      PGDATABASE: ${POSTGRES_DB}
      PGUSER: ${PGUSER}
      PGPASSWORD: ${PGPASSWORD}
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy

  agent:
    build:
      context: ./backend/agent
      dockerfile: Dockerfile
    container_name: ai-analyst-agent
    restart: unless-stopped
    environment:
      MCP_BASE_URL: http://mcp:8001
    ports:
      - "8000:8000"
    depends_on:
      mcp:
        condition: service_started
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend/chatbot
      dockerfile: Dockerfile
    container_name: ai-analyst-frontend
    restart: unless-stopped
    ports:
      - "3000:8501"
    environment:
      AGENT_BASE_URL: http://agent:8000
    depends_on:
      agent:
        condition: service_started

volumes:
  postgres_data:
