services:
  postgres:
    image: postgres:16
    container_name: bi-agent-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  mcp:
    build:
      context: ./backend
      dockerfile: mcp/Dockerfile
    container_name: bi-agent-mcp
    restart: unless-stopped
    environment:
      PGHOST: postgres
      PGPORT: 5432
      PGDATABASE: ${POSTGRES_DB}
      PGUSER: ${POSTGRES_USER}
      PGPASSWORD: ${POSTGRES_PASSWORD}
    expose:
      - "8001"
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.create_connection(('localhost', 8001), timeout=2); s.close()"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      postgres:
        condition: service_healthy

  agent:
    build:
      context: ./backend
      dockerfile: agent/Dockerfile
    container_name: bi-agent-agent
    restart: unless-stopped
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o}
      MCP_BASE_URL: http://mcp:8001/mcp
    ports:
      - "8000:8000"
    depends_on:
      mcp:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend/chatbot
      dockerfile: Dockerfile
    container_name: bi-agent-frontend
    restart: unless-stopped
    environment:
      AGENT_BASE_URL: http://agent:8000
    ports:
      - "3000:8501"
    depends_on:
      agent:
        condition: service_started

volumes:
  postgres_data:
